appId: com.bilitools.pro
productName: BiliTools-Pro
directories:
  buildResources: build
files:
  - dist/**/*
  - '!node_modules/**/*'
asar: true
win:
  target:
    - target: nsis
      arch: [x64]
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
linux:
  target:
    - target: AppImage
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
